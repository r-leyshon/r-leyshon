name: Generate GitHub Readme Stats cards

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-cards:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=r-leyshon&show_icons=true&theme=cobalt&include_all_commits=true&count_private=true&custom_title=Rich%20Leyshon%27s%20GitHub%20Stats
          path: assets/readme-stats/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=r-leyshon&size_weight=0.5&count_weight=0.5&hide=html,ruby&layout=compact
          path: assets/readme-stats/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit generated cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/readme-stats
          git commit -m "Update readme stats cards" || echo "No changes to commit"
          git push
